apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: external-secrets
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.18.2

    helm:
      values: |
        serviceAccount:
          create: true
          name: external-secrets

          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::219834006508:role/retail-platform-dev-external-secrets-role

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true