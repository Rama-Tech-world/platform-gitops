apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: external-dns
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    targetRevision: 1.18.0

    helm:
      values: |
        serviceAccount:
          create: true
          name: external-dns

          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::219834006508:role/retail-platform-dev-external-dns-role

        provider:
          name: aws

        policy: upsert-only

        registry: txt

        txtOwnerId: retail-platform-dev

        sources:
          - service
          - ingress

        domainFilters: []

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true