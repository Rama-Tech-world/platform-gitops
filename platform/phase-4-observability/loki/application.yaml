apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: loki
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: 7.1.0   # updated to latest chart version
    helm:
      values: |
        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1

        loki:
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          storage:
            type: filesystem

          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          limits_config:
            retention_period: 168h

        persistence:
          enabled: true
          storageClassName: gp3
          size: 20Gi

        gateway:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
