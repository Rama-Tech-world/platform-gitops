apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: loki
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.1.0

    helm:
      values: |
        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1

        backend:
          replicas: 0

        read:
          replicas: 0

        write:
          replicas: 0

        loki:
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          storage:
            type: filesystem

          limits_config:
            retention_period: 168h

        gateway:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true