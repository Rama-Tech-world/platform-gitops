apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: trivy-operator
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://aquasecurity.github.io/helm-charts/
    chart: trivy-operator
    targetRevision: 0.34.0   # updated to latest chart version

    helm:
      values: |
        operator:
          replicas: 1

        serviceMonitor:
          enabled: false

        trivy:
          ignoreUnfixed: true

  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
