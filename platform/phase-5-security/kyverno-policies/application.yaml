apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kyverno-policies
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://github.com/Rama-Tech-world/platform-gitops.git
    targetRevision: HEAD
    path: platform/phase-5-security/kyverno-policies

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true