apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: disallow-latest-tag

spec:
  validationFailureAction: Audit
  background: true

  rules:
    - name: validate-image-tag

      match:
        any:
          - resources:
              kinds:
                - Deployment

      validate:
        message: "latest image tag is not allowed"

        foreach:
          - list: "request.object.spec.template.spec.containers"

            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: EndsWith
                    value: ":latest"