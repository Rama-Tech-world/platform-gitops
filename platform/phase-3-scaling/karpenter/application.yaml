apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: karpenter
  namespace: argocd

spec:

  project: platform

  source:
    repoURL: https://charts.karpenter.sh
    chart: karpenter
    targetRevision: 1.0.8

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter

  syncPolicy:
    automated:
      prune: true
      selfHeal: true