apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: karpenter
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: "1.13.0"

    helm:
      releaseName: karpenter
      values: |
        settings:
          clusterName: retail-platform-dev
          interruptionQueue: retail-platform-dev

        serviceAccount:
          create: true
          name: karpenter
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::219834006508:role/retail-platform-dev-karpenter-controller-role

        replicas: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true