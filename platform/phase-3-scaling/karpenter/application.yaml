apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: karpenter
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: "1.13.0"

    helm:
      releaseName: karpenter
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true